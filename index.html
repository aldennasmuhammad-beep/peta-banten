<body>
    
    
<style>
.legend {

.legend i {

<div id="filter-panel" style="
    position: fixed;
    top: 10px; left: 60px;
    z-index: 9999;
    background: white;
    padding: 12px 14px;
    border-radius: 8px;
    box-shadow: 0 1px 5px rgba(0,0,0,0.4);
    font-family: Arial, sans-serif;
    font-size: 13px;
    width: 220px;
">
    <strong>Cari & Filter Wilayah</strong><br><br>
    <label for="searchName">Nama Kabupaten/Kota:</label><br>
    <input type="text" id="searchName" placeholder="contoh: Serang"
           style="width: 100%; padding: 4px; margin-bottom: 8px; box-sizing: border-box;"
           oninput="filterData()">

    <label for="minDensity">Kepadatan minimum (jiwa/km&sup2;):</label><br>
    <input type="number" id="minDensity" placeholder="contoh: 1000"
           style="width: 100%; padding: 4px; margin-bottom: 8px; box-sizing: border-box;"
           oninput="filterData()">

    <button onclick="resetData()" style="width: 100%; padding: 5px; cursor: pointer;">
        Reset
    </button>
</div>
    
<script>
// ===============================
// DATA KEPADATAN PENDUDUK BANTEN
// ===============================
const dataBanten = [{"name": "Kabupaten Pandeglang", "density": 487, "lat": -6.3175, "lng": 106.1007}, {"name": "Kabupaten Lebak", "density": 446, "lat": -6.45, "lng": 106.2528}, {"name": "Kabupaten Tangerang", "density": 3373, "lat": -6.1783, "lng": 106.6319}, {"name": "Kabupaten Serang", "density": 1181, "lat": -6.12, "lng": 106.1503}, {"name": "Kota Tangerang", "density": 11098, "lat": -6.1783, "lng": 106.6319}, {"name": "Kota Cilegon", "density": 2860, "lat": -6.0025, "lng": 106.0114}, {"name": "Kota Serang", "density": 2839, "lat": -6.1149, "lng": 106.1503}, {"name": "Kota Tangerang Selatan", "density": 8523, "lat": -6.2884, "lng": 106.718}];

let markers = [];

// ===============================
// WARNA & ICON (sesuai kategori kepadatan jiwa/km2)
// ===============================
function getColor(density) {
    if (density >= 5000) return "red";
    if (density >= 2000) return "orange";
    if (density >= 1000) return "yellow";
    return "green";
}

function getIcon(density) {
    const color = getColor(density);
    return L.icon({
        iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-${color}.png`,
        shadowUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41]
    });
}

// ===============================
// RENDER MARKER
// ===============================
function renderMarkers(data) {
    markers.forEach(m => map_305a02888ef8b09230967eac22324474.removeLayer(m));
    markers = [];

    data.forEach(d => {
        const marker = L.marker([d.lat, d.lng], { icon: getIcon(d.density) }).addTo(map_305a02888ef8b09230967eac22324474);
        marker.bindPopup(`<strong>${d.name}</strong><br>Kepadatan Penduduk: ${d.density.toLocaleString("id-ID")} jiwa/km&sup2;`);
        markers.push(marker);
    });
}

// ===============================
// FILTER & SEARCH
// ===============================
function filterData() {
    const name = document.getElementById("searchName").value.toLowerCase();
    const minDensity = document.getElementById("minDensity").value;

    const filtered = dataBanten.filter(d => {
        const matchName = name ? d.name.toLowerCase().includes(name) : true;
        const matchDensity = minDensity ? d.density >= minDensity : true;
        return matchName && matchDensity;
    });

    renderMarkers(filtered);
}

function resetData() {
    document.getElementById("searchName").value = "";
    document.getElementById("minDensity").value = "";
    renderMarkers(dataBanten);
}

// ===============================
// LEGENDA
// ===============================
const legend = L.control({ position: "bottomright" });
legend.onAdd = function () {
    const div = L.DomUtil.create("div", "legend");
    div.innerHTML = `
        <strong>Kepadatan Penduduk (jiwa/km&sup2;)</strong><br>
        <i style="background: green"></i> &lt; 1.000<br>
        <i style="background: yellow"></i> 1.000 &ndash; 1.999<br>
        <i style="background: orange"></i> 2.000 &ndash; 4.999<br>
        <i style="background: red"></i> &ge; 5.000
    `;
    return div;
};
legend.addTo(map_305a02888ef8b09230967eac22324474);

// ===============================
// SKALA & NORTH ARROW
// ===============================
L.control.scale({ position: "bottomleft", metric: true, imperial: false }).addTo(map_305a02888ef8b09230967eac22324474);

const northArrow = L.control({ position: "topleft" });
northArrow.onAdd = () => {
    const div = L.DomUtil.create("div", "north-arrow");
    div.innerHTML = "N &uarr;";
    return div;
};
northArrow.addTo(map_305a02888ef8b09230967eac22324474);
</script>

</body>

            var map_305a02888ef8b09230967eac22324474 = L.map(

                    crs: L.CRS.EPSG3857,
                    ...{
  "zoom": 9,

  "preferCanvas": false,
}

                }
            );

            

        
    
            var tile_layer_177241a97205d239ce29dce38787e579 = L.tileLayer(
                "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
                {
  "minZoom": 0,
  "maxZoom": 18,
  "maxNativeZoom": 18,
  "noWrap": false,
  "attribution": "\u0026copy; OpenStreetMap contributors",
  "subdomains": "abc",
  "detectRetina": false,
  "tms": false,
  "opacity": 1,
}

            );
        
    
            tile_layer_177241a97205d239ce29dce38787e579.addTo(map_305a02888ef8b09230967eac22324474);

            // ==============================================================
            // RENDER AWAL MARKER (Dipindahkan ke paling bawah setelah map siap)
            // ==============================================================
            renderMarkers(dataBanten);
        
</script>
