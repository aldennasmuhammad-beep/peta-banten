<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGIS Kependudukan Banten</title>
    
    <!-- CSS & JS Kebutuhan Peta -->
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #dbe6fd;
            padding: 15px;
            overflow: hidden;
        }
        
        /* Container Utama Dashboard */
        .dashboard-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 4px solid #f0f4ff;
        }

        /* Header Atas */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: #ffffff;
            border-bottom: 2px solid #f0f4ff;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-title {
            color: #2b3a80;
            font-size: 20px;
            font-weight: 700;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            text-align: right;
        }
        .header-right h2 {
            font-size: 20px;
            color: #3b4cb8;
            font-weight: 800;
        }
        .header-right p {
            font-size: 12px;
            color: #8fa0dd;
            font-weight: 600;
        }
        .header-icon {
            background: #e9efff;
            color: #3b4cb8;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        /* Konten Utama */
        .main-content {
            display: flex;
            flex: 1;
            width: 100%;
            height: calc(100% - 70px);
            position: relative;
        }

        /* Sidebar Kiri */
        .sidebar {
            width: 340px;
            background: #ffffff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-right: 2px solid #f0f4ff;
            overflow-y: auto;
            z-index: 10;
        }

        /* Input Pencarian */
        .search-container {
            position: relative;
            width: 100%;
        }
        .search-input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            background: #f4f7fe;
            border: 2px solid transparent;
            border-radius: 14px;
            font-size: 14px;
            color: #333;
            transition: all 0.3s;
        }
        .search-input:focus {
            border-color: #a3b8cc;
            background: #fff;
            outline: none;
        }
        .search-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #8898aa;
        }

        /* Detail Wilayah Panel */
        .detail-title {
            font-size: 16px;
            color: #2b3a80;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
        }
        .detail-card {
            background: #ffffff;
            border: 2px dashed #e2e9ff;
            border-radius: 16px;
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .wilayah-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            border-bottom: 1px dashed #e2e9ff;
            padding-bottom: 10px;
        }
        .wilayah-nama {
            font-size: 18px;
            font-weight: 700;
            color: #8b0000;
        }
        .status-badge {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
        }
        .status-tinggi { background: #ffebeb; color: #d63031; }
        .status-sedang { background: #fff4e5; color: #e67e22; }
        .status-rendah { background: #ebfbee; color: #27ae60; }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 13px;
        }
        .info-label {
            color: #7f8c8d;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .info-value {
            font-weight: 700;
            color: #2c3e50;
        }

        /* Area Peta */
        .map-wrapper {
            flex: 1;
            height: 100%;
            position: relative;
        }
        #map {
            width: 100%;
            height: 100%;
        }

        /* Legenda Kustom */
        .legend-card {
            background: white;
            padding: 15px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            font-size: 12px;
            line-height: 22px;
            color: #2c3e50;
            min-width: 180px;
        }
        .legend-title {
            font-weight: 700;
            color: #3b4cb8;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        /* Tombol Reset & Menu Pinggir */
        .map-btn-custom {
            background: white;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <!-- Bagian Atas / Header -->
        <div class="header">
            <div class="header-left">
                <button class="map-btn-custom"><i class="fa-solid fa-bars"></i></button>
            </div>
            <div class="header-right">
                <div>
                    <h2>Provinsi Banten 🗺️</h2>
                    <p>Data Kepadatan Penduduk Terbaru</p>
                </div>
                <div class="header-icon">
                    <i class="fa-solid fa-earth-asia"></i>
                </div>
            </div>
        </div>

        <!-- Bagian Konten -->
        <div class="main-content">
            <!-- Sidebar Kiri -->
            <div class="sidebar">
                <div class="search-container">
                    <input type="text" id="searchName" class="search-input" placeholder="Cari kabupaten/kota..." oninput="filterData()">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                </div>

                <div class="detail-title">
                    <i class="fa-solid fa-location-dot" style="color: #d63031;"></i> Detail Wilayah
                </div>

                <!-- Card Detail Dinamis -->
                <div class="detail-card" id="detail-card-content">
                    <p style="text-align: center; color: #95a5a6; font-size: 13px;">Silakan klik marker wilayah pada peta untuk melihat detail data kependudukan.</p>
                </div>
                
                <p style="font-size: 11px; color: #b2bec3; text-align: center;">WebGIS Project - Data Kependudukan</p>
            </div>

            <!-- Area Peta Leaflet -->
            <div class="map-wrapper">
                <div id="map"></div>
            </div>
        </div>
    </div>

    <script>
        // Data Kependudukan Banten Lengkap Estimasi Luas & Ibu Kota
        const dataBanten = [
            {"name": "Kabupaten Pandeglang", "density": 487, "pop": "1.307.000", "area": "2.683", "capital": "Pandeglang", "lat": -6.3175, "lng": 106.1007},
            {"name": "Kabupaten Lebak", "density": 446, "pop": "1.402.000", "area": "3.142", "capital": "Rangkasbitung", "lat": -6.4500, "lng": 106.2528},
            {"name": "Kabupaten Tangerang", "density": 3373, "pop": "3.244.000", "area": "961", "capital": "Tigaraksa", "lat": -6.1783, "lng": 106.4300},
            {"name": "Kabupaten Serang", "density": 1181, "pop": "1.676.000", "area": "1.419", "capital": "Ciruas", "lat": -6.1200, "lng": 106.1503},
            {"name": "Kota Tangerang", "density": 11098, "pop": "1.895.000", "area": "170", "capital": "Tangerang", "lat": -6.1783, "lng": 106.6319},
            {"name": "Kota Cilegon", "density": 2860, "pop": "446.000", "area": "156", "capital": "Cilegon", "lat": -6.0025, "lng": 106.0114},
            {"name": "Kota Serang", "density": 2839, "pop": "712.000", "area": "251", "capital": "Serang", "lat": -6.1149, "lng": 106.2200},
            {"name": "Kota Tangerang Selatan", "density": 8523, "lat": -6.2884, "lng": 106.7180, "pop": "1.378.000", "area": "162", "capital": "Ciputat"}
        ];

        // Inisialisasi Peta - Menggunakan Basemap Minimalis CartoDB Positron agar mirip contoh
        var map = L.map('map', {
            center: [-6.30, 106.30],
            zoom: 10,
            zoomControl: false
        });

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        // Tambah tombol Zoom di kanan atas agar rapi
        L.control.zoom({ position: 'topright' }).addTo(map);

        let markersLayer = L.layerGroup().addTo(map);

        // Fungsi kategori kepadatan warna bulat
        function getColor(density) {
            if (density >= 5000) return "#8b0000"; // Sangat Padat
            if (density >= 2000) return "#d63031"; // Padat
            if (density >= 1000) return "#e67e22"; // Cukup Padat
            return "#27ae60"; // Jarang
        }

        function getStatusText(density) {
            if (density >= 5000) return "Sangat Padat";
            if (density >= 2000) return "Padat";
            if (density >= 1000) return "Cukup Padat";
            return "Jarang Pndk";
        }

        function getStatusClass(density) {
            if (density >= 5000) return "status-tinggi";
            if (density >= 2000) return "status-tinggi";
            if (density >= 1000) return "status-sedang";
            return "status-rendah";
        }

        // Custom Marker Pin Warna-warni menggunakan SVG agar lebih smooth & modern
        function createCustomIcon(density) {
            const color = getColor(density);
            const svgHtml = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32">
                <path fill="${color}" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                <circle cx="12" cy="9" r="3" fill="white"/>
            </svg>`;
            
            return L.divIcon({
                html: svgHtml,
                className: 'custom-pin',
                iconSize: [32, 32],
                iconAnchor: [16, 32],
                popupAnchor: [0, -30]
            });
        }

        // Fungsi memunculkan data ke sidebar kiri ketika diclick
        function showDetail(wilayah) {
            const card = document.getElementById('detail-card-content');
            const statusClass = getStatusClass(wilayah.density);
            const statusText = getStatusText(wilayah.density);

            card.innerHTML = `
                <div class="wilayah-header">
                    <div class="wilayah-nama">${wilayah.name}</div>
                    <div class="status-badge ${statusClass}"><i class="fa-solid fa-fire"></i> ${statusText}</div>
                </div>
                <div class="info-row">
                    <span class="info-label"><i class="fa-solid fa-building-flag"></i> Ibu Kota</span>
                    <span class="info-value">${wilayah.capital}</span>
                </div>
                <div class="info-row">
                    <span class="info-label"><i class="fa-solid fa-users"></i> Total Penduduk</span>
                    <span class="info-value">${wilayah.pop} Jiwa</span>
                </div>
                <div class="info-row">
                    <span class="info-label"><i class="fa-solid fa-map-layer-group"></i> Luas Wilayah</span>
                    <span class="info-value">${wilayah.area} km²</span>
                </div>
                <div class="info-row">
                    <span class="info-label"><i class="fa-solid fa-chart-area"></i> Kepadatan</span>
                    <span class="info-value">${wilayah.density.toLocaleString('id-ID')} /km²</span>
                </div>
            `;
        }

        // Render Semua Marker ke Peta
        function renderMarkers(data) {
            markersLayer.clearLayers();
            data.forEach(d => {
                const marker = L.marker([d.lat, d.lng], { icon: createCustomIcon(d.density) });
                
                // Event saat marker di-klik
                marker.on('click', function() {
                    showDetail(d);
                    map.setView([d.lat, d.lng], 11);
                });

                // Popup kecil standar di atas marker
                marker.bindPopup(`<b>${d.name}</b><br>Ibu kota: ${d.capital}`);
                markersLayer.addLayer(marker);
            });
        }

        // Fungsi Filter / Search nama kota
        function filterData() {
            const searchVal = document.getElementById("searchName").value.toLowerCase();
            const filtered = dataBanten.filter(d => d.name.toLowerCase().includes(searchVal));
            renderMarkers(filtered);
            
            if(filtered.length === 1) {
                showDetail(filtered[0]);
                map.setView([filtered[0].lat, filtered[0].lng], 11);
            }
        }

        // Membuat Legenda Modern Kustom di Kanan Bawah
        const legend = L.control({ position: "bottomright" });
        legend.onAdd = function () {
            const div = L.DomUtil.create("div", "legend-card");
            div.innerHTML = `
                <div class="legend-title"><i class="fa-solid fa-palette"></i> Kepadatan Penduduk</div>
                <div style="color: #7f8c8d; font-size:10px; margin-bottom:8px;">Jiwa per km²</div>
                <div class="legend-item"><span class="legend-color" style="background: #8b0000"></span> &ge; 5.000 (Sangat Padat)</div>
                <div class="legend-item"><span class="legend-color" style="background: #d63031"></span> 2.000 &ndash; 4.999</div>
                <div class="legend-item"><span class="legend-color" style="background: #e67e22"></span> 1.000 &ndash; 1.999</div>
                <div class="legend-item"><span class="legend-color" style="background: #27ae60"></span> &lt; 1.000 (Jarang)</div>
            `;
            return div;
        };
        legend.addTo(map);

        // Render Awal saat Halaman Dimuat
        renderMarkers(dataBanten);
    </script>
</body>
</html>
